# Копировать в /etc/nginx/sites-available/frontier-site
# Временный default на :80 и :443 для доступа по IP до подключения домена.
# HTTPS: self-signed cert (браузер попросит подтвердить — это нормально до домена).

server {
    listen 80 default_server;
    listen [::]:80 default_server ipv6only=on;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/frontier-ip/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/frontier-ip/key.pem;

    client_max_body_size 20m;

    # Старые маршруты ads-factory SPA
    location = /login { return 302 /; }
    location = /register { return 302 /; }
    location = /dashboard { return 302 /; }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
